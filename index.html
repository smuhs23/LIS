<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ladepark Invest Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1>Ladepark Invest Dashboard</h1>
    <nav class="tabs">
      <button data-tab="plan" class="active">Plan</button>
      <button data-tab="ist">Ist</button>
    </nav>
    <div class="park-controls">
      <select id="park-select"></select>
      <button id="park-save">Speichern</button>
      <button id="park-export-json">JSON</button>
      <button id="park-import-json">Import</button>
      <button id="export-xlsx">Excel</button>
      <button id="export-pdf">PDF</button>
      <input type="file" id="import-file" accept="application/json" hidden />
    </div>
  </header>

  <main>
    <section id="tab-plan" class="tab-panel">
      <div class="layout">
        <form id="input-form" class="inputs"></form>
        <div class="dashboard">
          <div id="warnings" class="warnings"></div>
          <div id="kpis" class="kpis"></div>
          <div class="chart-grid">
            <canvas id="chart-cumulative"></canvas>
            <canvas id="chart-annual"></canvas>
          </div>
          <div id="comparison" class="comparison"></div>
        </div>
      </div>
    </section>

    <section id="tab-ist" class="tab-panel" hidden>
      <div id="ist-view"></div>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
