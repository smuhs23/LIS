<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ladepark Invest Dashboard</title>
  <meta name="theme-color" content="#0E1A38" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body data-theme="light">
  <div class="app" id="app">

    <!-- Eingaben: dunkle, kollabierbare Sidebar -->
    <aside class="sidebar" id="sidebar" data-screen-label="Eingaben">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2 4 14h6l-1 8 9-12h-6z" fill="currentColor" stroke="none"></path>
            </svg>
          </span>
          <span class="brand-text">
            <strong>Ladepark</strong>
            <em>Invest Dashboard</em>
          </span>
        </div>
        <button class="rail-btn" id="collapse-btn" title="Eingaben einklappen" aria-label="Eingaben einklappen">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"></path></svg>
        </button>
      </div>

      <div class="sidebar-scroll">
        <p class="sidebar-kicker">Annahmen &amp; Parameter</p>
        <form id="input-form" class="inputs"></form>
      </div>

      <div class="sidebar-rail" id="sidebar-rail">
        <button class="rail-btn" id="expand-btn" title="Eingaben ausklappen" aria-label="Eingaben ausklappen">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
        </button>
        <span class="rail-label">Eingaben</span>
      </div>
    </aside>

    <div class="scrim" id="scrim"></div>

    <!-- Hauptbereich -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn only-mobile" id="sidebar-toggle" title="Eingaben" aria-label="Eingaben öffnen">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>

        <nav class="tabs" role="tablist">
          <button data-tab="plan" class="active" role="tab">Plan</button>
          <button data-tab="ist" role="tab">Ist</button>
        </nav>

        <div class="topbar-spacer"></div>

        <div class="park-controls">
          <div class="select-wrap">
            <select id="park-select" title="Park auswählen"></select>
          </div>
          <button id="park-save" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>
            <span>Speichern</span>
          </button>
          <div class="btn-group">
            <button id="park-export-json" class="btn btn-ghost">JSON</button>
            <button id="park-import-json" class="btn btn-ghost">Import</button>
            <button id="export-xlsx" class="btn btn-ghost">Excel</button>
            <button id="export-pdf" class="btn btn-ghost">PDF</button>
          </div>
          <input type="file" id="import-file" accept="application/json" hidden />
        </div>

        <button class="icon-btn theme-toggle" id="theme-toggle" title="Hell / Dunkel umschalten" aria-label="Theme umschalten">
          <svg class="icon-sun" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
        </button>
      </header>

      <main class="content">
        <section id="tab-plan" class="tab-panel" data-screen-label="Plan">
          <div id="warnings" class="warnings"></div>

          <div class="section-row">
            <h2 class="section-title">Kennzahlen</h2>
            <span class="section-hint" id="scenario-hint"></span>
          </div>
          <div id="kpis" class="kpis"></div>

          <div class="chart-grid">
            <div class="chart-card">
              <div class="chart-head">
                <h3>Kumulierter Cashflow</h3>
                <div class="legend">
                  <span class="dot dot-navy"></span>Projekt
                  <span class="dot dot-lime"></span>Eigenkapital
                </div>
              </div>
              <div class="chart-body"><canvas id="chart-cumulative"></canvas></div>
            </div>
            <div class="chart-card">
              <div class="chart-head">
                <h3>Jährlicher Cashflow</h3>
                <div class="legend">
                  <span class="dot dot-navy"></span>Cashflow
                  <span class="dot dot-bad"></span>Reinvestitionsjahr
                </div>
              </div>
              <div class="chart-body"><canvas id="chart-annual"></canvas></div>
            </div>
          </div>

          <div class="section-row">
            <h2 class="section-title">Variantenvergleich</h2>
            <span class="section-hint">Grundstück × Finanzierung</span>
          </div>
          <div id="comparison" class="comparison"></div>
        </section>

        <section id="tab-ist" class="tab-panel" hidden data-screen-label="Ist">
          <div id="ist-view"></div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="src/ui.js"></script>
</body>
</html>
